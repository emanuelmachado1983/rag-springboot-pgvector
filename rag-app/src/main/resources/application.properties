spring.application.name=rag-app

spring.datasource.url=jdbc:postgresql://localhost:5434/ragdb
spring.datasource.username=postgres
spring.datasource.password=rag123
spring.datasource.driver-class-name=org.postgresql.Driver

server.port=8082

# Toggle de la capa de generación. En false (default), /api/documents/search
# se comporta exactamente igual que antes (solo retrieval, sin LLM).
rag.llm.enabled=false
# La API key NUNCA va hardcodeada ni versionada: se lee de la variable de entorno ANTHROPIC_API_KEY.
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-haiku-4-5-20251001
